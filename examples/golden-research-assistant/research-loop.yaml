# golden-research-assistant.yaml
# A portable research loop that runs on any conforming engine.
# Same YAML, same verification, same trace — different runtimes.

LOOPFILE: "1.0"
name: golden-research-assistant
version: 1.0.0
description: >
  Golden example: a multi-source research assistant that answers a
  question using at least three primary sources, verifies every claim
  is cited, and produces a research brief. Runs identically across
  INFINI Reference, Hermes, and OpenClaw.

OBJECTIVE: >
  Answer the research question using at least three primary sources,
  with every claim cited and citations verified. Produce a research
  brief that a human reviewer would accept as well-sourced.

AGENTS:
  - { name: researcher, role: researcher, model_tier: sonnet, tools: [browser, file_system] }
  - { name: verifier,   role: verifier,   model_tier: sonnet, tools: [browser] }
  - { name: writer,     role: builder,    model_tier: haiku,  tools: [file_system] }

STEPS:
  - id: s1
    name: find_sources
    action: browser.find_sources
    uses: researcher
    produces: [sources.json]
  - id: s2
    name: extract_claims
    action: browser.extract_claims
    uses: researcher
    depends_on: [s1]
    produces: [claims.json]
  - id: s3
    name: verify_citations
    action: browser.verify_citations
    uses: verifier
    depends_on: [s2]
    produces: [citation-check.json]
    retry: { max: 2, backoff: exponential }
  - id: s4
    name: write_brief
    action: file_system.write
    uses: writer
    depends_on: [s3]
    produces: [research_brief.md]

VERIFY:
  syntactic:
    - "sources.json:valid_json"
    - "claims.json:valid_json"
    - "research_brief.md:exists"
    - "research_brief.md:every_claim_has_citation"
    - "sources.json:at_least_three_sources"
  semantic:
    - "judge:source_quality>=85"
    - "judge:answer_quality>=85"
    - "judge:citation_accuracy>=90"
  confidence_threshold: 85

BUDGET: { dollars: 6, minutes: 20, tokens: 500000 }

STOP_WHEN:
  - all_verify_passed
  - iterations>=3

LESSONS: { path: memory/golden-research.md, append: true }
STATE:   { path: state/golden-research/, resume: true }
