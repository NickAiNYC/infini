LOOPFILE: "1.0"
name: research-agent
version: 1.0.0
description: >
  Golden example: Research agent that finds sources, extracts claims,
  verifies citations, and produces a research brief. Demonstrates DAG
  execution, two-tier verification, budget enforcement, and memory.

OBJECTIVE: >
  Answer a research question using at least three primary sources,
  with every claim cited and citations verified.

AGENTS:
  - { name: researcher, role: researcher, model_tier: sonnet, tools: [browser.navigate, browser.scrape] }
  - { name: verifier, role: verifier, model_tier: haiku, tools: [browser.navigate] }
  - { name: writer, role: builder, model_tier: sonnet, tools: [file_system.write] }

STEPS:
  - id: s1
    name: find_sources
    action: browser.navigate
    uses: researcher
    produces: [sources.json]
  - id: s2
    name: extract_claims
    action: browser.scrape
    uses: researcher
    depends_on: [s1]
    produces: [claims.json]
  - id: s3
    name: verify_citations
    action: browser.navigate
    uses: verifier
    depends_on: [s2]
    produces: [citation-check.json]
    retry: { max: 2, backoff: exponential }
  - id: s4
    name: write_brief
    action: file_system.write
    uses: writer
    depends_on: [s3]
    produces: [research-brief.md]

VERIFY:
  syntactic:
    - "sources.json:valid_json"
    - "claims.json:valid_json"
    - "research-brief.md:exists"
    - "research-brief.md:every_claim_has_citation"
  semantic:
    - "judge:source_quality>=85"
    - "judge:answer_quality>=85"
    - "judge:citation_accuracy>=90"
  confidence_threshold: 85

BUDGET: { dollars: 6, minutes: 20, tokens: 500000 }

STOP_WHEN:
  - all_verify_passed
  - iterations>=3

TOOLS:
  - mcp: "github.com/modelcontextprotocol/servers/src/filesystem"

memory:
  persist: true
  context_window: 100
