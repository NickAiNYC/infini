<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <defs>
    <linearGradient id="infini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8494ff"/>
      <stop offset="50%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <path d="M 40 50 C 40 30, 70 30, 100 50 C 130 70, 160 70, 160 50 C 160 30, 130 30, 100 50 C 70 70, 40 70, 40 50 Z"
          fill="none" stroke="url(#infini-grad)" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
