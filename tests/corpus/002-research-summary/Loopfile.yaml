# Corpus case 002: research-summary
# Multi-source research with citation verification. Tests browser tools and semantic verification.
LOOPFILE: "1.0"
name: 002-research-summary
version: 1.0.0
description: >
  Corpus case 002: Multi-source research with citation verification. Tests browser tools and semantic verification.

OBJECTIVE: >
  Multi-source research with citation verification. Tests browser tools and semantic verification.

AGENTS:
  - { name: researcher, role: researcher, model_tier: sonnet }
  - { name: verifier, role: verifier, model_tier: haiku }

STEPS:
  - { id: s1, name: find_sources, action: browser.find_sources, uses: researcher, produces: [sources.json] }
  - { id: s2, name: extract_claims, action: browser.extract_claims, uses: researcher, depends_on: [s1], produces: [claims.json] }
  - { id: s3, name: verify_cites, action: browser.verify_citations, uses: verifier, depends_on: [s2], produces: [citation-check.json] }
  - { id: s4, name: write_brief, action: file_system.write, uses: researcher, depends_on: [s3], produces: [brief.md] }

VERIFY:
  syntactic:
    - "brief.md:every_claim_has_citation"
  semantic:
    - "judge:source_quality>=85"
  confidence_threshold: 85

BUDGET: { dollars: 6, minutes: 20 }
STOP_WHEN:
  - all_verify_passed
  - iterations>=3
