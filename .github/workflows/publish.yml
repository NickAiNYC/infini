name: Publish to PyPI

# Triggers when you push a git tag matching v* (e.g. v0.1.0, v0.2.1)
# Builds the package, runs twine check, and uploads to PyPI.
# Requires the PYPI_API_TOKEN secret to be set in repo settings.
#
# See RELEASE.md for the full release process.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

      - name: Confirm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "::notice::Published infini-cli $VERSION to PyPI"
          echo "::notice::Install with: pip install infini-cli==$VERSION"
