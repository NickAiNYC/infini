LOOM: "1.0"
name: sre-loop
version: 1.0.0
description: Investigate, mitigate, and postmortem an SRE incident.
author: loom
license: MIT

OBJECTIVE: "Investigate a production incident, propose and (with approval) apply mitigation, then produce a blameless postmortem with action items."

INPUTS:
  - { name: incident_id, type: string, required: true }
  - { name: alert_payload, type: json, required: true }
  - { name: repo_path, type: file, required: false }

CONSTRAINTS:
  - blameless_language
  - no_unapproved_changes_to_production
  - every_action_item_has_owner_and_due_date

AGENTS:
  - { name: investigator, role: researcher, model_tier: sonnet, tools: [bash, file_io] }
  - { name: mitigator,    role: builder,    model_tier: sonnet, tools: [bash] }
  - { name: judge,        role: verifier,   model_tier: opus,   tools: [bash, file_io] }
  - { name: writer,       role: builder,    model_tier: sonnet, tools: [file_io] }

STEPS:
  - id: s1
    name: investigate
    action: gather_timeline_and_evidence
    uses: investigator
    produces: [timeline.md, evidence.md]
  - id: s2
    name: hypothesize
    action: identify_root_cause_candidates
    uses: investigator
    depends_on: [s1]
    produces: [hypotheses.md]
  - id: s3
    name: mitigate
    action: propose_mitigation
    uses: mitigator
    depends_on: [s2]
    produces: [mitigation_plan.md]
  - id: s4
    name: verify_mitigation
    action: judge_mitigation_safety
    uses: judge
    depends_on: [s3]
    produces: [mitigation_review.md]
  - id: s5
    name: postmortem
    action: write_blameless_postmortem
    uses: writer
    depends_on: [s4]
    produces: [postmortem.md]
  - id: s6
    name: verify_postmortem
    action: judge_postmortem_quality
    uses: judge
    depends_on: [s5]
    produces: [verification_report.md]

VERIFY:
  syntactic: ["postmortem.md:valid_markdown", "all_action_items_have_owners"]
  semantic:  ["blameless_language:verified", "root_cause:identified", "action_items:specific"]
  external:  ["timeline:matches_logs"]
  confidence_threshold: 85

BUDGET: { dollars: 5, tokens: 500000, minutes: 30, external_calls: 50 }

ESCALATE_WHEN:
  production_change_required: true
  severity: sev1
  ambiguity_above: 0.4
  consecutive_failures: 1

STOP_WHEN: ["root_cause_identified", "mitigation_proposed", "postmortem_complete"]

SELF_IMPROVE:
  on_success: [lessons.md, postmortem.md]
  on_failure: [lessons.md, hypotheses.md]
  lessons_file: state/lessons.md

STATE:
  file: state/loop_state.json
  resume_strategy: continue
