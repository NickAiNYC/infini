LOOM: "1.0"
name: research-loop
version: 1.0.0
description: Multi-source research with citations and freshness checks.
author: loom
license: MIT

OBJECTIVE: "Answer a research question using at least 5 independent sources, cross-validated, with explicit confidence scoring and a freshness requirement."

INPUTS:
  - { name: question, type: string, required: true }
  - { name: freshness_requirement, type: string, required: false, default: "within_12_months" }

CONSTRAINTS:
  - min_sources: 5
  - all_claims_cited
  - confidence_score_required
  - no_single_source_dominates

AGENTS:
  - { name: searcher,  role: researcher, model_tier: haiku,  tools: [web_search] }
  - { name: reader,    role: researcher, model_tier: sonnet, tools: [web_reader] }
  - { name: cross_checker, role: verifier, model_tier: sonnet, tools: [web_search, web_reader] }
  - { name: synthesizer, role: manager, model_tier: opus, tools: [file_io] }

STEPS:
  - id: s1
    name: search
    action: find_sources
    uses: searcher
    produces: [sources_raw.json]
  - id: s2
    name: read
    action: extract_claims
    uses: reader
    depends_on: [s1]
    produces: [claims.json]
    parallel: true
  - id: s3
    name: cross_check
    action: verify_claims_against_other_sources
    uses: cross_checker
    depends_on: [s2]
    produces: [cross_check_report.md]
  - id: s4
    name: synthesize
    action: write_report
    uses: synthesizer
    depends_on: [s3]
    produces: [report.md]
  - id: s5
    name: verify
    action: judge_report
    uses: synthesizer
    depends_on: [s4]
    produces: [verification_report.md]

VERIFY:
  syntactic: ["report.md:valid_markdown", "all_claims_have_citations"]
  semantic:  ["cross_validation:>=3_sources_per_claim", "confidence_score:present", "freshness:met"]
  external:  ["citations:reachable", "no_dead_links"]
  confidence_threshold: 80

BUDGET: { dollars: 4, tokens: 400000, minutes: 20, external_calls: 100 }

ESCALATE_WHEN:
  ambiguity_above: 0.5
  sources_below_minimum: true
  consecutive_failures: 2

STOP_WHEN: ["min_sources_met", "all_claims_cross_validated", "confidence>=80"]

SELF_IMPROVE:
  on_success: [lessons.md]
  on_failure: [lessons.md, sources_raw.json]
  lessons_file: state/lessons.md

STATE:
  file: state/loop_state.json
  resume_strategy: continue
