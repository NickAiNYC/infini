# recovery-loop.yaml
# Incident recovery loop with memory across incidents.
# Demonstrates: durable memory, multi-incident learning, postmortem generation.

LOOPFILE: "1.0"
name: recovery-loop
version: 1.0.0
description: >
  Triage an incident, propose a mitigation, verify the mitigation, and
  generate a signed postmortem. Memory persists across incidents so
  the loop learns from prior recoveries.

ENGINE:
  type: hermes
  adapter: adapters/hermes
  governance:
    memory: true
    audit_log: true
    budget_policy: advisory
    escalation_policy: enabled

OBJECTIVE: >
  Mitigate the active incident and produce a signed postmortem that
  references prior similar incidents from memory.

AGENTS:
  - { name: triager,    role: researcher, model_tier: sonnet, tools: [read, memory, metrics] }
  - { name: mitigator,  role: builder,    model_tier: opus,   tools: [read, write, terminal, deploy] }
  - { name: verifier,   role: verifier,   model_tier: sonnet, tools: [read, metrics] }
  - { name: auditor,    role: verifier,   model_tier: opus,   tools: [read, memory, audit] }

STEPS:
  - id: s1
    name: recall_similar
    action: memory.recall_similar
    uses: triager
    produces: [memory/similar-incidents.json]
  - id: s2
    name: triage
    action: incident.triage
    uses: triager
    depends_on: [s1]
    produces: [triage.md]
  - id: s3
    name: mitigate
    action: incident.mitigate
    uses: mitigator
    depends_on: [s2]
    produces: [mitigation.md]
    retry: { max: 3, backoff: exponential }
  - id: s4
    name: verify_recovered
    action: incident.verify_recovered
    uses: verifier
    depends_on: [s3]
    produces: [verification.json]
  - id: s5
    name: postmortem
    action: incident.postmortem
    uses: mitigator
    depends_on: [s4]
    produces: [postmortem.md]
  - id: s6
    name: audit_sign
    action: audit.sign
    uses: auditor
    depends_on: [s5]
    produces: [postmortem.signed.md, audit/log.jsonl]

VERIFY:
  syntactic:
    - "postmortem.signed.md:exists"
    - "verification.json:status_recovered"
    - "audit/log.jsonl:non_empty"
  semantic:
    - "judge:root_citation>=85"
    - "judge:references_prior_incidents>=1"
  confidence_threshold: 80

BUDGET: { dollars: 15, minutes: 45 }

STOP_WHEN:
  - all_verify_passed
  - iterations>=4

LESSONS: { path: memory/recovery.md, append: true }
STATE:   { path: state/recovery/, resume: true }
