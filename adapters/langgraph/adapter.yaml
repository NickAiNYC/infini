# LangGraph Adapter Manifest
# Status: Preview — mock mode working, live mode coming

adapter:
  name: langgraph
  version: 0.1.0
  spec: LOOPFILE-1.0
  type: execution
  description: >
    LangGraph adapter — runs INFINI Loopfiles as LangGraph StateGraphs.
    Mock mode works today (deterministic, no API key). Live mode
    requires langgraph installed.

engine:
  type: langgraph
  runtime: langgraph
  min_version: "0.2.0"

capabilities:
  parse_loopfile: true
  run_loop: true
  verify: true
  inspect_trace: true
  replay: false
  diff: false

install:
  pip: infini-cli[langgraph]

repo: https://github.com/NickAiNYC/infini/tree/main/adapters/langgraph
