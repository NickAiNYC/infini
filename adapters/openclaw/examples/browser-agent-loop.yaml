# browser-agent-loop.yaml
# A multi-step browser task run through OpenClaw.
# Demonstrates: navigate, scrape, screenshot, verify, with retry on failure.

LOOPFILE: "1.0"
name: browser-agent-loop
version: 1.0.0
description: >
  Visit three competitor pricing pages, scrape the pricing table from each,
  screenshot the result, and produce a comparison report.

ENGINE:
  type: openclaw
  adapter: adapters/openclaw
  tools:
    - browser
    - file_system

OBJECTIVE: >
  Produce pricing_comparison.md with the pricing tiers of three named
  competitors, each row citing the source URL and a screenshot path.

AGENTS:
  - { name: scraper, role: researcher, model_tier: sonnet, tools: [browser, file_system] }
  - { name: writer,  role: builder,    model_tier: haiku,  tools: [file_system] }

STEPS:
  - id: s1
    name: scrape_alpha
    action: browser.scrape_pricing
    uses: scraper
    produces: [scrapes/alpha.json, screenshots/alpha.png]
    retry: { max: 3, backoff: exponential }
  - id: s2
    name: scrape_beta
    action: browser.scrape_pricing
    uses: scraper
    produces: [scrapes/beta.json, screenshots/beta.png]
    retry: { max: 3, backoff: exponential }
  - id: s3
    name: scrape_gamma
    action: browser.scrape_pricing
    uses: scraper
    produces: [scrapes/gamma.json, screenshots/gamma.png]
    retry: { max: 3, backoff: exponential }
  - id: s4
    name: compare
    action: file_system.write
    uses: writer
    depends_on: [s1, s2, s3]
    produces: [pricing_comparison.md]

VERIFY:
  syntactic:
    - "scrapes/alpha.json:valid_json"
    - "scrapes/beta.json:valid_json"
    - "scrapes/gamma.json:valid_json"
    - "pricing_comparison.md:exists"
    - "pricing_comparison.md:has_three_rows"
  semantic:
    - "judge:pricing_accuracy>=85"
    - "judge:citation_present>=1"
  confidence_threshold: 80

BUDGET: { dollars: 3, minutes: 12 }

STOP_WHEN:
  - all_verify_passed
  - iterations>=3

STATE: { path: state/browser-agent-loop/, resume: true }
