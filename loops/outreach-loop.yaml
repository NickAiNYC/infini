LOOM: "1.0"
name: outreach-loop
version: 1.0.0
description: Personalized outreach at scale, with reply-rate optimization.
author: loom
license: MIT

OBJECTIVE: "Generate personalized outreach messages for a list of targets, grounded in their public profile, with reply-rate optimization and an explicit opt-out and anti-spam policy."

INPUTS:
  - { name: targets, type: file,   required: true }
  - { name: offer,   type: string, required: true }
  - { name: voice,   type: string, required: false, default: "warm_professional" }

CONSTRAINTS:
  - one_message_per_target
  - no_false_personalization
  - compliant_with_can_spam_and_gdpr
  - max_one_followup_per_target

AGENTS:
  - { name: profiler, role: researcher, model_tier: haiku,  tools: [web_search, web_reader] }
  - { name: writer,   role: builder,    model_tier: sonnet, tools: [file_io] }
  - { name: compliance, role: verifier, model_tier: sonnet, tools: [file_io] }

STEPS:
  - id: s1
    name: profile
    action: gather_public_context
    uses: profiler
    produces: [profiles.json]
  - id: s2
    name: draft
    action: write_personalized_messages
    uses: writer
    depends_on: [s1]
    produces: [messages.json]
    parallel: true
  - id: s3
    name: compliance_check
    action: verify_compliance
    uses: compliance
    depends_on: [s2]
    produces: [compliance_report.md]
  - id: s4
    name: verify
    action: judge_personalization_quality
    uses: compliance
    depends_on: [s3]
    produces: [verification_report.md]

VERIFY:
  syntactic: ["messages.json:valid_json", "all_messages_have_opt_out"]
  semantic:  ["personalization:grounded", "no_template_reuse_across_targets", "compliance:passed"]
  external:  ["profiles:publicly_available_only"]
  confidence_threshold: 85

BUDGET: { dollars: 3, tokens: 300000, minutes: 15, external_calls: 200 }

ESCALATE_WHEN:
  compliance_violation: true
  ambiguity_above: 0.5
  consecutive_failures: 2

STOP_WHEN: ["all_messages_compliant", "personalization_verified"]

SELF_IMPROVE:
  on_success: [lessons.md, reply_rate_tracking.md]
  on_failure: [lessons.md, compliance_report.md]
  lessons_file: state/lessons.md

STATE:
  file: state/loop_state.json
  resume_strategy: continue
