LOOM: "1.0"
name: refactor-loop
version: 1.0.0
description: Refactor a module without changing behavior.
author: loom
license: MIT

OBJECTIVE: "Refactor the target module to improve the requested quality dimension (readability, performance, testability) while preserving 100% of existing behavior."

INPUTS:
  - { name: repo_path, type: file,   required: true }
  - { name: module,    type: string, required: true }
  - { name: dimension, type: string, required: true, enum: [readability, performance, testability] }

CONSTRAINTS:
  - behavior_preserved
  - no_new_dependencies
  - test_coverage_not_decreased

AGENTS:
  - { name: analyzer, role: researcher, model_tier: sonnet, tools: [file_io, bash] }
  - { name: coder,    role: builder,    model_tier: sonnet, tools: [file_io, bash] }
  - { name: judge,    role: verifier,   model_tier: opus,   tools: [bash] }

STEPS:
  - id: s1
    name: baseline
    action: capture_behavior_baseline
    uses: analyzer
    produces: [baseline_tests.json, baseline_perf.json]
  - id: s2
    name: plan
    action: write_refactor_plan
    uses: analyzer
    depends_on: [s1]
    produces: [refactor_plan.md]
  - id: s3
    name: refactor
    action: apply_refactor
    uses: coder
    depends_on: [s2]
    produces: [src_diff.patch]
    retry: { max: 3, backoff: exponential }
  - id: s4
    name: verify_behavior
    action: compare_against_baseline
    uses: judge
    depends_on: [s3]
    produces: [behavior_diff.md]
  - id: s5
    name: verify_quality
    action: judge_quality_gain
    uses: judge
    depends_on: [s3]
    parallel: true
    produces: [quality_diff.md]

VERIFY:
  syntactic: ["tests:pass", "lint:clean", "coverage:>=baseline"]
  semantic:  ["behavior_diff:zero_changes", "quality_diff:improves"]
  external:  ["perf_diff:within_5%"]
  confidence_threshold: 90

BUDGET: { dollars: 8, tokens: 800000, minutes: 25, external_calls: 50 }

ESCALATE_WHEN:
  ambiguity_above: 0.5
  consecutive_failures: 2
  budget_used_percent: 80

STOP_WHEN: ["all_verify_passed", "behavior_preserved"]

SELF_IMPROVE:
  on_success: [lessons.md]
  on_failure: [lessons.md, baseline_tests.json]
  lessons_file: state/lessons.md

STATE:
  file: state/loop_state.json
  resume_strategy: continue
