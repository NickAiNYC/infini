LOOM: "1.0"
name: doc-sync-loop
version: 1.0.0
description: Keep documentation in sync with code.
author: loom
license: MIT

OBJECTIVE: "Detect drift between code and documentation, then update the docs to match the current behavior of the code."

INPUTS:
  - { name: repo_path, type: file, required: true }
  - { name: docs_path, type: file, required: false, default: "./docs" }

CONSTRAINTS:
  - no_code_changes
  - all_examples_runnable
  - api_signatures_match

AGENTS:
  - { name: differ,  role: researcher, model_tier: haiku,  tools: [bash, file_io] }
  - { name: writer,  role: builder,    model_tier: sonnet, tools: [file_io] }
  - { name: judge,   role: verifier,   model_tier: sonnet, tools: [bash] }

STEPS:
  - id: s1
    name: extract_api
    action: extract_api_surface
    uses: differ
    produces: [api.json]
  - id: s2
    name: extract_docs
    action: extract_documented_api
    uses: differ
    produces: [docs_api.json]
  - id: s3
    name: diff
    action: compute_drift
    uses: differ
    depends_on: [s1, s2]
    produces: [drift_report.md]
  - id: s4
    name: update
    action: update_docs_to_match
    uses: writer
    depends_on: [s3]
    produces: [docs_diff.patch]
  - id: s5
    name: verify
    action: run_examples_and_check_signatures
    uses: judge
    depends_on: [s4]
    produces: [verification_report.md]

VERIFY:
  syntactic: ["docs:valid_markdown", "examples:runnable"]
  semantic:  ["api_signatures:match_code", "no_remaining_drift"]
  external:  ["examples:execute_successfully"]
  confidence_threshold: 90

BUDGET: { dollars: 3, tokens: 300000, minutes: 15, external_calls: 0 }

ESCALATE_WHEN:
  drift_too_large: true
  consecutive_failures: 3

STOP_WHEN: ["no_drift_remaining", "examples_runnable"]

SELF_IMPROVE:
  on_success: [lessons.md]
  on_failure: [lessons.md, drift_report.md]
  lessons_file: state/lessons.md

STATE:
  file: state/loop_state.json
  resume_strategy: continue
