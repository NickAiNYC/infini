LOOM: "1.0"
name: test-gen-loop
version: 1.0.0
description: Generate tests until coverage hits the target.
author: loom
license: MIT

OBJECTIVE: "Generate unit tests for the target module until coverage meets or exceeds the specified threshold, with all tests passing."

INPUTS:
  - { name: repo_path, type: file,   required: true }
  - { name: module,    type: string, required: true }
  - { name: target_coverage, type: number, required: true, default: 90 }

CONSTRAINTS:
  - all_new_tests_pass
  - no_existing_tests_modified
  - no_network_calls_in_tests

AGENTS:
  - { name: coverage, role: researcher, model_tier: haiku,  tools: [bash] }
  - { name: writer,   role: builder,    model_tier: sonnet, tools: [file_io, bash] }
  - { name: runner,   role: builder,    model_tier: haiku,  tools: [bash] }
  - { name: judge,    role: verifier,   model_tier: sonnet, tools: [bash] }

STEPS:
  - id: s1
    name: baseline_coverage
    action: measure_coverage
    uses: coverage
    produces: [coverage_baseline.json]
  - id: s2
    name: identify_gaps
    action: find_uncovered_paths
    uses: coverage
    depends_on: [s1]
    produces: [gaps.md]
  - id: s3
    name: generate
    action: write_tests_for_gaps
    uses: writer
    depends_on: [s2]
    produces: [tests/]
    retry: { max: 3, backoff: exponential }
  - id: s4
    name: run_tests
    action: run_new_tests
    uses: runner
    depends_on: [s3]
    produces: [test_report.txt]
  - id: s5
    name: measure
    action: measure_coverage_again
    uses: coverage
    depends_on: [s4]
    produces: [coverage_after.json]
  - id: s6
    name: judge
    action: verify_threshold_met
    uses: judge
    depends_on: [s5]
    produces: [verification_report.md]

VERIFY:
  syntactic: ["tests:pass", "lint:clean"]
  semantic:  ["coverage:>={target_coverage}", "no_flaky_tests"]
  external:  ["coverage_report:valid"]
  confidence_threshold: 85

BUDGET: { dollars: 4, tokens: 400000, minutes: 20, external_calls: 10 }

ESCALATE_WHEN:
  consecutive_failures: 3
  budget_used_percent: 80

STOP_WHEN: ["coverage>=target", "all_tests_pass"]

SELF_IMPROVE:
  on_success: [lessons.md]
  on_failure: [lessons.md, gaps.md]
  lessons_file: state/lessons.md

STATE:
  file: state/loop_state.json
  resume_strategy: continue
