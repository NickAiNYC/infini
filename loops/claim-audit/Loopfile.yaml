LOOPFILE: "1.0"
name: claim-audit
version: 1.0.0
OBJECTIVE: Audit a public website for claim assertions — extract, classify, identify proof gaps, and emit prioritized findings.
AGENTS:
  - { name: extractor, role: researcher, model_tier: sonnet, tools: [web, file_system] }
  - { name: classifier, role: builder, model_tier: sonnet, tools: [file_system] }
  - { name: analyst, role: researcher, model_tier: sonnet, tools: [file_system] }
  - { name: verifier, role: verifier, model_tier: haiku, tools: [file_system] }
STEPS:
  - { id: s1, name: extract-claims, action: web.extract_assertions, uses: extractor, produces: [extracted-claims.json] }
  - { id: s2, name: classify-claims, action: claims.classify, uses: classifier, depends_on: [s1], produces: [classified-claims.json] }
  - { id: s3, name: identify-gaps, action: claims.identify_gaps, uses: analyst, depends_on: [s2], produces: [proof-gaps.json] }
  - { id: s4, name: audit-review, action: claims.audit, uses: analyst, depends_on: [s2], produces: [audit-summary.md] }
  - { id: s5, name: emit-findings, action: findings.emit, uses: extractor, depends_on: [s3, s4], produces: [findings.md, findings.json] }
VERIFY:
  syntactic:
    - "extracted-claims.json:exists"
    - "classified-claims.json:valid_json"
    - "proof-gaps.json:valid_json"
    - "findings.md:exists"
    - "findings.json:valid_json"
  semantic:
    - "judge:extraction_coverage>=80"
    - "judge:classification_accuracy>=85"
  confidence_threshold: 80
BUDGET: { dollars: 4, minutes: 20 }
STOP_WHEN: [all_verify_passed, iterations>=2]
