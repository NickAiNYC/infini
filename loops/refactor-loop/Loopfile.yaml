# loops/refactor-loop/Loopfile.yaml — canonical loop (draft)
LOOPFILE: "1.0"
name: refactor-loop
version: 0.1.0
description: >
  Canonical refactor-loop. Curated, versioned, benchmarked.
  See essay.md for when to use and when not to use this loop.

OBJECTIVE: >
  Refactor a named module without changing its observable behavior, preserving 100% of existing tests.

AGENTS:
  - { name: refactorer, role: builder, model_tier: sonnet, tools: [file_system, terminal] }
  - { name: guard, role: verifier, model_tier: haiku, tools: [terminal] }

STEPS:
  - { id: s1, name: map_calls, action: refactor.map_calls, uses: refactorer, produces: [call-graph.json] }
  - { id: s2, name: refactor, action: refactor.apply, uses: refactorer, depends_on: [s1], produces: [src/] }
  - { id: s3, name: test, action: terminal.run, uses: guard, depends_on: [s2], produces: [test-output.log] }
  - { id: s4, name: diff_behavior, action: refactor.diff_behavior, uses: guard, depends_on: [s2, s3], produces: [behavior-diff.json] }

VERIFY:
  syntactic:
    - "src/:exists"
    - "test-output.log:exit_zero"
    - "behavior-diff.json:no_changes"
  semantic:
    - "judge:behavior_preserved>=95"
  confidence_threshold: 85

BUDGET: { dollars: 5, minutes: 20 }

STOP_WHEN:
  - all_verify_passed
  - iterations>=3

LESSONS: { path: memory/refactor-loop.md, append: true }
STATE:   { path: state/refactor-loop/, resume: true }
