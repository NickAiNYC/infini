# loops/research-loop/Loopfile.yaml — canonical loop (draft)
LOOPFILE: "1.0"
name: research-loop
version: 0.1.0
description: >
  Canonical research-loop. Curated, versioned, benchmarked.
  See essay.md for when to use and when not to use this loop.

OBJECTIVE: >
  Answer a research question using at least three primary sources, with every claim cited and citations verified.

AGENTS:
  - { name: researcher, role: researcher, model_tier: sonnet, tools: [browser, file_system] }
  - { name: verifier, role: verifier, model_tier: sonnet, tools: [browser] }

STEPS:
  - { id: s1, name: find_sources, action: browser.find_sources, uses: researcher, produces: [sources.json] }
  - { id: s2, name: extract, action: browser.extract_claims, uses: researcher, depends_on: [s1], produces: [claims.json] }
  - { id: s3, name: verify_cites, action: browser.verify_citations, uses: verifier, depends_on: [s2], produces: [citation-check.json] }
  - { id: s4, name: write_brief, action: file_system.write, uses: researcher, depends_on: [s3], produces: [research_brief.md] }

VERIFY:
  syntactic:
    - "sources.json:valid_json"
    - "claims.json:valid_json"
    - "research_brief.md:every_claim_has_citation"
  semantic:
    - "judge:source_quality>=85"
    - "judge:answer_quality>=85"
  confidence_threshold: 85

BUDGET: { dollars: 5, minutes: 20 }

STOP_WHEN:
  - all_verify_passed
  - iterations>=3

LESSONS: { path: memory/research-loop.md, append: true }
STATE:   { path: state/research-loop/, resume: true }
