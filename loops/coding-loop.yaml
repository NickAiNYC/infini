LOOM: "1.0"
name: coding-loop
version: 1.0.0
description: Implement a feature, preserve all tests.
author: loom
license: MIT

OBJECTIVE: "Implement the requested feature in the target repo, preserving all existing tests and lint cleanliness."

INPUTS:
  - { name: repo_path,  type: file,   required: true }
  - { name: feature,    type: string, required: true }
  - { name: constraints, type: json,  required: false, default: [] }

CONSTRAINTS:
  - no_new_dependencies
  - lint_clean
  - no_ui_regressions
  - all_existing_tests_pass

AGENTS:
  - { name: planner,  role: manager,   model_tier: sonnet, tools: [file_io, bash] }
  - { name: coder,    role: builder,   model_tier: sonnet, tools: [file_io, bash] }
  - { name: runner,   role: builder,   model_tier: haiku,  tools: [bash] }
  - { name: judge,    role: verifier,  model_tier: opus,   tools: [bash, file_io] }

STEPS:
  - id: s1
    name: plan
    action: write_implementation_plan
    uses: planner
    produces: [plan.md]
  - id: s2
    name: code
    action: implement_feature
    uses: coder
    depends_on: [s1]
    produces: [src_diff.patch]
    retry: { max: 2, backoff: exponential }
  - id: s3
    name: test
    action: run_test_suite
    uses: runner
    depends_on: [s2]
    produces: [test_report.txt]
  - id: s4
    name: lint
    action: run_linter
    uses: runner
    depends_on: [s2]
    parallel: true
    produces: [lint_report.txt]
  - id: s5
    name: verify
    action: judge_implementation
    uses: judge
    depends_on: [s3, s4]
    produces: [verification_report.md]

VERIFY:
  syntactic:
    - "tests:pass"
    - "lint:clean"
    - "typecheck:pass"
  semantic:
    - "rubric:feature_completeness>=85"
    - "rubric:no_regressions>=95"
  external:
    - "screenshot_diff:<5%"
  confidence_threshold: 85

BUDGET:
  dollars: 5
  tokens: 500000
  minutes: 15
  external_calls: 30

ESCALATE_WHEN:
  ambiguity_above: 0.7
  consecutive_failures: 3
  budget_used_percent: 80
  irreversible_action: true

STOP_WHEN:
  - "all_verify_passed"
  - "confidence>=85"

SELF_IMPROVE:
  on_success: [lessons.md]
  on_failure: [lessons.md, rubric.md, loops/coding-loop.yaml]
  lessons_file: state/lessons.md

STATE:
  file: state/loop_state.json
  resume_strategy: continue
