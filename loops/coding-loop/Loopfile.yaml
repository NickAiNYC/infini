# loops/coding-loop/Loopfile.yaml — canonical loop (draft)
LOOPFILE: "1.0"
name: coding-loop
version: 0.1.0
description: >
  Canonical coding-loop. Curated, versioned, benchmarked.
  See essay.md for when to use and when not to use this loop.

OBJECTIVE: >
  Implement a feature described in a GitHub issue, preserve all existing tests, and open a pull request.

AGENTS:
  - { name: coder, role: builder, model_tier: sonnet, tools: [file_system, terminal, github] }
  - { name: tester, role: verifier, model_tier: haiku, tools: [terminal] }

STEPS:
  - { id: s1, name: plan, action: coding.plan, uses: coder, produces: [plan.md] }
  - { id: s2, name: edit, action: file_system.write, uses: coder, depends_on: [s1], produces: [src/, test-output.log] }
  - { id: s3, name: test, action: terminal.run, uses: tester, depends_on: [s2], produces: [test-output.log] }
  - { id: s4, name: open_pr, action: github.open_pr, uses: coder, depends_on: [s3], produces: [pr-url.txt] }

VERIFY:
  syntactic:
    - "src/:exists"
    - "test-output.log:exit_zero"
    - "pr-url.txt:valid_url"
  semantic:
    - "judge:feature_completeness>=90"
    - "judge:test_coverage>=85"
  confidence_threshold: 85

BUDGET: { dollars: 5, minutes: 20 }

STOP_WHEN:
  - all_verify_passed
  - iterations>=3

LESSONS: { path: memory/coding-loop.md, append: true }
STATE:   { path: state/coding-loop/, resume: true }
