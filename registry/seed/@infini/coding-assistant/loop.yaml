LOOPFILE: "1.0"
name: coding-assistant
version: 1.0.0
description: "Code generation + test + review"

OBJECTIVE: "Code generation + test + review."

AGENTS:
  - { name: coder, role: builder, model_tier: sonnet }
  - { name: judge, role: verifier, model_tier: sonnet }
  - { name: tester, role: verifier, model_tier: haiku }

STEPS:
  - { id: s1, name: implement, action: terminal.run, uses: coder, produces: ['src/'] }
  - { id: s2, name: test, action: terminal.run, uses: tester, depends_on: [s1], produces: ['test-output.log'] }
  - { id: s3, name: review, action: verify, uses: judge, depends_on: [s2], produces: ['review.md'] }

VERIFY:
  syntactic:
    - "test-output.log:exit_zero"
    - "review.md:exists"
  semantic:
    - "judge:code_quality>=85"
  confidence_threshold: 85

BUDGET: { dollars: 5, minutes: 15 }
STOP_WHEN: ["all_verify_passed", "iterations>=3"]

memory:
  persist: true
  context_window: 50
